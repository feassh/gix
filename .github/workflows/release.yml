name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p dist
          output="dist/gix_${VERSION}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X 'gix/internal/buildinfo.Version=${VERSION}' -X 'gix/internal/buildinfo.DefaultUpdateRepo=${REPO}'" \
            -o "${output}" \
            ./cmd/gix

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          cd dist
          sha256sum gix_* > "gix_${VERSION}_checksums.txt"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || gh release create "${VERSION}" --title "${VERSION}" --notes "Automated release for ${VERSION}"
          gh release upload "${VERSION}" dist/* --clobber
